[package]
name    = "dxl-pirate"
version = "0.1.0"
edition = "2024"
description = "Host-commanded DXL bus multi-tool (master + listener + injector) firmware for nanoCH32V203 — used by tools/dxl-bench"

[lib]
name = "dxl_pirate"
path = "src/lib.rs"

[[bin]]
name  = "dxl-pirate"
path  = "src/main.rs"

[dependencies]

# Gated to riscv32 so `cargo test --lib --target=<host>` doesn't pull in
# portable-atomic's `unsafe-assume-single-core` (embedded-only) or any of the
# WCH/embassy crates.
[target.'cfg(target_arch = "riscv32")'.dependencies]
# ch32-hal V203 metadata ships with empty dma_channels, so TxDma<USART1> isn't
# generated; the hot path drives USART/DMA via metapac directly.
ch32-hal  = { git = "https://github.com/ch32-rs/ch32-hal", default-features = false, features = [
  "ch32v203c8t6",
  "rt",
  "embassy",
  "memory-x",
] }
# Pinned to git main for ch32-rs/qingke#25 — V4 critical-section uses
# the 0x88 mask (MIE + MPIE together) to avoid an INESTEN=1
# MIE-stuck-at-0 wedge when `critical_section::with` runs inside an ISR
# body. The patch override below also redirects ch32-hal's transitive
# 0.7 dep so we end up with one qingke instance, not two.
qingke    = { git = "https://github.com/ch32-rs/qingke", features = ["v4", "critical-section-impl"] }
qingke-rt = { git = "https://github.com/ch32-rs/qingke", features = ["v4"] }

embassy-executor = { version = "0.9", features = ["arch-spin", "executor-thread"] }
embassy-futures  = "0.1"
embassy-sync     = "0.7"
embassy-time     = "0.5"
embassy-usb      = { version = "0.5", default-features = false }
# embassy-usb 0.5.1 was built against embassy-usb-driver 0.2.0; the 0.2.1
# point release silently bumped embedded-io-async from 0.6 to 0.7. Pin
# explicitly to dodge the trait-impl mismatch.
embassy-usb-driver = "=0.2.0"

portable-atomic  = { version = "1", features = ["unsafe-assume-single-core"] }
critical-section = "1"
heapless         = "0.8"
static_cell      = "2"

panic-halt = "1"

# Local checkout of ch32-hal carries `feat-dma-isrs-feature` (commit
# 47cfe6b), which gates the auto-generated DMA1_CHANNELx ISR stubs behind
# the `dma-isrs` Cargo feature. We supply our own DMA1_CHANNEL1/CHANNEL3
# handlers (capture.rs) so the feature stays OFF; without this patch the
# upstream pin (71a2985) emits stubs unconditionally and the link fails
# on "symbol multiply defined".
[patch."https://github.com/ch32-rs/ch32-hal"]
ch32-hal = { path = "/Users/aaron/projects/ch32-rs/ch32-hal" }

# Redirect ch32-hal's transitive `qingke = "0.7"` and `qingke-rt = "0.7"`
# crates.io deps to git main so we end up with exactly one qingke
# instance carrying the V4 0x88-mask fix (PR #25). Without this override
# we'd link two copies — the critical-section-impl from one wouldn't
# apply to call sites that resolve to the other, and the wedge would
# remain.
[patch.crates-io]
qingke    = { git = "https://github.com/ch32-rs/qingke" }
qingke-rt = { git = "https://github.com/ch32-rs/qingke" }

[profile.release]
opt-level     = 3
lto           = true
codegen-units = 1
panic         = "abort"
debug         = 2

[profile.dev]
opt-level     = 3
lto           = true
codegen-units = 1
debug         = 2
debug-assertions = false

