[default.general]
chip = "STM32F301K8Ux"

[default.rtt]
enabled = true
timeout = 3000

# Channel 0: Log output (up only)
# Channel 1: REPL interactive (up + down paired)
tabs = [
    { up_channel = 0, name = "log", format = "String" },
    { up_channel = 1, down_channel = 1, name = "repl", format = "String" },
]

[default.reset]
halt_afterwards = false

[default.flashing]
enabled = true

[default.gdb]
enabled = false
