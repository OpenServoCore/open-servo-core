[workspace]
resolver = "2"

[package]
name    = "osc-ch32"
version = "0.0.0"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
ch32-metapac     = { git = "https://github.com/ch32-rs/ch32-metapac", default-features = false, features = ["pac", "rt"] }
embedded-storage = "0.3"
osc-core         = { path = "../lib/core" }
osc-units        = { path = "../lib/units" }
riscv            = "0.12"
defmt            = { version = "1", optional = true }
critical-section = { version = "1.2", optional = true }

[build-dependencies]
ch32-metapac = { git = "https://github.com/ch32-rs/ch32-metapac", default-features = false, features = ["metadata"] }

[features]
default = []
ch32v006x8x6 = ["ch32-metapac/ch32v006x8x6"]
defmt        = ["dep:defmt", "dep:critical-section", "osc-core/defmt"]
