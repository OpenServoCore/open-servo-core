[package]
name    = "osc-drivers"
version = "0.0.0"
edition.workspace = true
license.workspace = true

[features]
mocks = ["dep:mockall", "dxl-protocol/software-crc"]

[dependencies]
osc-core.workspace = true
dxl-protocol       = { workspace = true, features = ["heapless"] }
heapless.workspace = true
mockall            = { version = "0.14", optional = true }

[dev-dependencies]
dxl-protocol = { workspace = true, features = ["heapless", "software-crc"] }
heapless.workspace = true
mockall      = "0.14"
