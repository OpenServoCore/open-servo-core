[package]
name    = "osc-integration"
version = "0.0.0"
edition.workspace = true
license.workspace = true

[dependencies]
osc-core     = { workspace = true, features = ["log"] }
osc-drivers  = { workspace = true, features = ["mocks", "log"] }
dxl-protocol = { workspace = true, features = ["alloc", "software-crc", "log"] }
log          = "0.4"
mockall      = "0.14"

[dev-dependencies]
env_logger = "0.11"
insta      = "1"
test-log   = "0.2"

[[test]]
name = "protocol"
path = "tests/protocol/mod.rs"

[[test]]
name = "registers"
path = "tests/registers/mod.rs"

[[test]]
name = "timing"
path = "tests/timing/mod.rs"
