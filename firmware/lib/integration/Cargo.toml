[package]
name    = "osc-integration"
version = "0.0.0"
edition.workspace = true
license.workspace = true

[dependencies]
osc-servo-core     = { workspace = true, features = ["log"] }
osc-servo-drivers  = { workspace = true, features = ["log"] }
osc-protocol = { workspace = true, features = ["software-crc"] }
control-table.workspace = true
log = "0.4"

[dev-dependencies]
env_logger   = "0.11"
rstest       = "0.23"
rstest_reuse = "0.7"
test-log     = "0.2"

[[test]]
name = "protocol"
path = "tests/protocol.rs"

[[test]]
name = "chains"
path = "tests/chains.rs"

[[test]]
name = "resilience"
path = "tests/resilience.rs"

[[test]]
name = "timing"
path = "tests/timing.rs"
