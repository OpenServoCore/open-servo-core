[package]
name    = "dxl-protocol"
version = "0.0.0"
edition.workspace = true
license.workspace = true

[dependencies]
crc.workspace = true
heapless      = { workspace = true, optional = true }
defmt         = { version = "1", optional = true }
log           = { version = "0.4", optional = true }

[dev-dependencies]
dxl-protocol = { path = ".", features = ["heapless", "software-crc"] }

[features]
default      = []
heapless     = ["dep:heapless"]
alloc        = []
defmt        = ["dep:defmt"]
log          = ["dep:log"]
# Reference software impl of `CrcUmts` (CRC-16/UMTS). Off by default so chips
# bring their own (hardware-CRC peripheral, table-driven, etc.) — the chip is
# the authority on how a frame's CRC is computed. Enabled here only for
# dxl-protocol's own tests; downstream test crates that want a stock impl can
# turn it on too.
software-crc = []
