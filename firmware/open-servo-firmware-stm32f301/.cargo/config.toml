# STM32F301-specific configuration
[build]
target = "thumbv7em-none-eabihf"

[target.thumbv7em-none-eabihf]
# Use osctl as the runner: cargo run will flash and open GUI
# Install with: cargo install --path ../../tools/osctl
runner = "osctl"

rustflags = [
  "-C", "linker=flip-link",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tdefmt.x",
  "-C", "link-arg=--icf=all",
]

[unstable]
build-std = ["core"]

[env]
DEFMT_LOG = "trace"
