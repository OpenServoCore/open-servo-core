[package]
name    = "osc-dev-v006-boot"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-boot"
test  = false
bench = false

[dependencies]
tinyboot-ch32    = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.4.1", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
tinyboot-ch32-rt = "0.4.1"
panic-halt       = "1"

[features]
# Rev B wire: 74LVC2G241 buffer + TX_EN, full-duplex USART behind it.
# Default (off) = direct single wire via HDSEL half-duplex.
wire-buffered = []
