[package]
name    = "osc-dev-v006-boot"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-boot"
test  = false
bench = false

[dependencies]
tinyboot-ch32    = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.5.0", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
tinyboot-ch32-rt = "0.4.1"
panic-halt       = "1"

[features]
default = []
# Direct single wire (rev C HDSEL) -- tinyboot's flag, additive. Default
# (absent) = rev B 74LVC2G241 buffer + TX_EN, full duplex behind it (the
# current fleet), matching the app's convention.
half-duplex = ["tinyboot-ch32/half-duplex"]
