[package]
name    = "osc-dev-v006-boot"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-boot"
test  = false
bench = false

[dependencies]
tinyboot-ch32    = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.5.0", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
tinyboot-ch32-rt = "0.4.1"
panic-halt       = "1"

[features]
# Exactly one wire. Default = direct single wire (tinyboot's `half-duplex`
# feature). Rev B buffered wire (74LVC2G241 + TX_EN, full duplex behind
# it): build with --no-default-features --features wire-buffered — the
# tinyboot feature is additive, so the default must be dropped, and
# main.rs turns either misuse into a compile_error naming this rule.
default = ["direct-wire"]
direct-wire = ["tinyboot-ch32/half-duplex"]
wire-buffered = []
