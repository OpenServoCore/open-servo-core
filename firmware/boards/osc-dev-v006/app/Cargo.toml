[package]
name    = "osc-dev-v006-app"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-app"
test  = false
bench = false

[dependencies]
osc-ch32      = { path = "../../../ch32", default-features = false, features = ["ch32v006x8x6"] }
tinyboot-ch32 = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.4.1", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
qingke-rt     = { version = "0.6", features = ["v2"] }
panic-halt    = "1"
