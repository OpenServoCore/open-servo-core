[package]
name    = "osc-dev-v006-app"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-app"
path  = "src/main.rs"
test  = false
bench = false

[dependencies]
osc-ch32      = { path = "../../../ch32", default-features = false, features = ["ch32v006x8x6", "rt"] }
tinyboot-ch32 = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.5.0", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
# Bleeding-edge: track ch32-rs/qingke main.
qingke        = { git = "https://github.com/ch32-rs/qingke.git", branch = "main", features = ["v2", "critical-section-impl"] }
qingke-rt     = { git = "https://github.com/ch32-rs/qingke.git", branch = "main", features = ["v2"] }
panic-halt    = "1"
defmt         = { version = "1", optional = true }
defmt-rtt     = { version = "1", optional = true }

[features]
default = []
defmt   = ["dep:defmt", "dep:defmt-rtt", "osc-ch32/defmt"]
# Debug-link-dumpable probe counters (no wire/table impact).
bench   = ["osc-ch32/bench"]
# Direct HDSEL single wire (rev C, or rev B with the buffer bypassed) --
# tinyboot's flag. Default (absent) = rev B 74LVC2G241 buffer + TX_EN
# (the current fleet).
half-duplex = ["osc-ch32/half-duplex"]
