[package]
name    = "osc-dev-v006-app"
version = "0.1.0"
edition.workspace = true

[[bin]]
name  = "osc-dev-v006-app"
path  = "src/main.rs"
test  = false
bench = false

[dependencies]
osc-ch32      = { path = "../../../ch32", default-features = false, features = ["ch32v006x8x6", "rt"] }
tinyboot-ch32 = { git = "https://github.com/OpenServoCore/tinyboot.git", tag = "tinyboot-ch32-v0.4.1", default-features = false, features = ["ch32v006x8x6", "system-flash"] }
qingke        = { version = "0.7", features = ["v2", "critical-section-impl"] }
qingke-rt     = { version = "0.7", features = ["v2", "highcode"] }
panic-halt    = "1"
defmt         = { version = "1", optional = true }
defmt-rtt     = { version = "1", optional = true }

[features]
# Production default: TIM2 OPM hardware fire. See osc-ch32 Cargo.toml +
# docs/dxl-fast-chain-crc.md §15. `dxl-systick-fire` is a dev/bench
# escape hatch only — enabled when TIM2 is needed for a motor encoder.
default          = ["dxl-hw-fire"]
defmt            = ["dep:defmt", "dep:defmt-rtt", "osc-ch32/defmt"]
dxl-systick-fire = ["osc-ch32/dxl-systick-fire"]
dxl-hw-fire      = ["osc-ch32/dxl-hw-fire"]
