[build]
target = "riscv32ec_zmmul-unknown-none-elf.json"

[unstable]
build-std         = ["core"]
json-target-spec  = true

[env]
DEFMT_LOG = "trace"
# DXL service caps — bound dispatcher + buffer sizes at build time.
# Defaults live in osc-core/services/dxl/limits.rs and control-table/stage.rs.
OSC_MAX_SLAVE_COUNT = "16"
OSC_MAX_CONTROL_RW  = "128"
OSC_STAGE_DATA_CAP  = "128"
OSC_STAGE_ENTRY_CAP = "16"

[target.riscv32ec_zmmul-unknown-none-elf]
# probe-rs fork auto-detects WCH parts; no --chip needed.
runner = "probe-rs run"
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=--nmagic",
]
