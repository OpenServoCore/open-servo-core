name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build + test (firmware/lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/lib

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --tests -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo check --features mocks
        run: cargo check -p osc-drivers --features mocks

  dxl-protocol-features:
    name: dxl-protocol feature matrix
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/lib/dxl-protocol
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/lib

      - name: build --no-default-features
        run: cargo build --no-default-features

      - name: build --no-default-features --features heapless
        run: cargo build --no-default-features --features heapless

      - name: build --no-default-features --features alloc
        run: cargo build --no-default-features --features alloc

      - name: build --all-features
        run: cargo build --all-features

  ch32-build-test:
    name: build + test (firmware/ch32)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/ch32
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/ch32

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --tests --features ch32v006x8x6 -- -D warnings

      - name: cargo build
        run: cargo build --features ch32v006x8x6

      - name: cargo test
        run: cargo test --features ch32v006x8x6 --lib

  baud-rdt-matrix:
    name: test (baud=${{ matrix.baud_name }}, rdt=${{ matrix.rdt_us }}us)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/lib
    strategy:
      fail-fast: false
      matrix:
        # Edit this list to add or remove RDT buckets.
        rdt_us: [0, 128, 256, 384, 510]
        include:
          - { baud_idx: 0, baud_name: "9600"   }
          - { baud_idx: 1, baud_name: "57600"  }
          - { baud_idx: 2, baud_name: "115200" }
          - { baud_idx: 3, baud_name: "1M"     }
          - { baud_idx: 4, baud_name: "2M"     }
          - { baud_idx: 5, baud_name: "3M"     }
    env:
      OSC_TEST_BAUD_IDX: ${{ matrix.baud_idx }}
      OSC_TEST_RDT_US: ${{ matrix.rdt_us }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly)
        uses: dtolnay/rust-toolchain@nightly

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/lib
          key: baud-${{ matrix.baud_idx }}-rdt-${{ matrix.rdt_us }}

      - name: cargo test --workspace
        run: cargo test --workspace

  osc-dev-v006-cross-build:
    name: cross-build (boards/osc-dev-v006)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/boards/osc-dev-v006
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/boards/osc-dev-v006

      - name: cargo check --workspace
        run: cargo check --workspace
