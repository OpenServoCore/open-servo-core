name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build + test (firmware/lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/lib
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/lib
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --tests -- -D warnings
      - name: cargo build
        run: cargo build --workspace
      - name: cargo test
        run: cargo test --workspace
      - name: cargo check --features mocks
        run: cargo check -p osc-servo-drivers --features mocks
      - name: cargo check --features bench
        run: cargo check -p osc-servo-drivers --features bench

  ch32-build-test:
    name: build + test (firmware/servo-ch32)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/servo-ch32
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/servo-ch32
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --tests --features ch32v006x8x6 -- -D warnings
      - name: cargo build
        run: cargo build --features ch32v006x8x6
      - name: cargo test
        run: cargo test --features ch32v006x8x6 --lib
      - name: cargo check --features bench
        run: cargo check --features ch32v006x8x6,bench

  osc-dev-v006-cross-build:
    name: cross-build (boards/osc-dev-v006)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/boards/osc-dev-v006
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + rust-src + llvm-tools)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools, clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/boards/osc-dev-v006
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace -- -D warnings
      - name: cargo check --workspace
        run: cargo check --workspace
      - name: cargo build --release (app image)
        run: cargo build --release -p osc-dev-v006-app
      - name: no soft div/mod/mul gate
        working-directory: ${{ github.workspace }}
        run: bash .github/check-soft-arith.sh

  bench-tools:
    name: build + test (tools/bench)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/bench
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/bench
      - name: install libudev (serialport build dep)
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --tests -- -D warnings
      - name: cargo test (units; hardware suite is on-rig only)
        run: cargo test --lib

  uart-pirate:
    name: build (tools/uart-pirate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools/uart-pirate
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (nightly + clippy + rustfmt + target)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt
          targets: riscv32imc-unknown-none-elf
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tools/uart-pirate
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy -- -D warnings
      - name: cargo build --release
        run: cargo build --release
