name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    name: build + test (firmware/lib)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/lib

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --tests -- -D warnings

      - name: cargo build
        run: cargo build --workspace

      - name: cargo test
        run: cargo test --workspace

      - name: cargo check --features mocks
        run: cargo check -p osc-drivers --features mocks

  ch32-build-test:
    name: build + test (firmware/ch32)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/ch32
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + clippy + rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/ch32

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --tests --features ch32v006x8x6 -- -D warnings

      - name: cargo build
        run: cargo build --features ch32v006x8x6

      - name: cargo test
        run: cargo test --features ch32v006x8x6 --lib

  osc-dev-v006-cross-build:
    name: cross-build (boards/osc-dev-v006)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: firmware/boards/osc-dev-v006
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (nightly + rust-src + llvm-tools)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src, llvm-tools

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: firmware/boards/osc-dev-v006

      - name: cargo check --workspace
        run: cargo check --workspace

      - name: cargo build --release (app image)
        run: cargo build --release -p osc-dev-v006-app

      - name: no soft div/mod/mul gate
        working-directory: ${{ github.workspace }}
        run: bash .github/check-soft-arith.sh
